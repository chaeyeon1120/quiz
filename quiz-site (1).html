<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>클래스 퀴즈</title>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e17;
    --surface: #1a1827;
    --card: #22203a;
    --accent: #f4c430;
    --accent2: #e86a3a;
    --text: #fffffe;
    --muted: #a7a9be;
    --success: #2ec4b6;
    --error: #e84545;
    --border: rgba(255,255,255,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(244,196,48,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 80% 80%, rgba(232,106,58,0.07) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }
  .wrapper { position: relative; z-index: 1; width: 100%; max-width: 780px; }
  header { text-align: center; padding: 40px 0 30px; }
  header .label { font-size: 11px; letter-spacing: 4px; text-transform: uppercase; color: var(--accent); font-weight: 500; margin-bottom: 12px; }
  header h1 { font-family: 'Gowun Batang', serif; font-size: clamp(28px, 5vw, 48px); font-weight: 700; line-height: 1.1; }
  header h1 span { color: var(--accent); }

  .tabs { display: flex; gap: 4px; background: var(--surface); border-radius: 16px; padding: 6px; margin-bottom: 28px; border: 1px solid var(--border); }
  .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 10px; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; font-size: 14px; font-weight: 500; transition: all 0.25s ease; background: transparent; color: var(--muted); }
  .tab-btn.active { background: var(--accent); color: #0f0e17; font-weight: 700; }
  .tab-btn:hover:not(.active) { color: var(--text); background: var(--border); }

  .panel { display: none; }
  .panel.active { display: block; }

  .card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 32px; margin-bottom: 20px; }
  .card-title { font-size: 13px; letter-spacing: 2px; text-transform: uppercase; color: var(--accent2); font-weight: 600; margin-bottom: 20px; }

  label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 8px; font-weight: 500; }
  input[type="text"], textarea, input[type="password"] {
    width: 100%; background: var(--surface); border: 1.5px solid var(--border); border-radius: 12px;
    padding: 14px 16px; color: var(--text); font-family: 'Noto Sans KR', sans-serif; font-size: 15px;
    outline: none; transition: border-color 0.2s; margin-bottom: 18px;
  }
  input[type="text"]:focus, textarea:focus, input[type="password"]:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 90px; }

  .btn { display: inline-flex; align-items: center; gap: 8px; padding: 14px 28px; border: none; border-radius: 12px; font-family: 'Noto Sans KR', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s ease; }
  .btn-primary { background: var(--accent); color: #0f0e17; width: 100%; justify-content: center; }
  .btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); }
  .btn-danger { background: transparent; color: var(--error); border: 1px solid var(--error); padding: 8px 14px; font-size: 13px; border-radius: 8px; }
  .btn-danger:hover { background: var(--error); color: white; }

  .q-list { list-style: none; }
  .q-item { display: flex; align-items: flex-start; gap: 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 18px 20px; margin-bottom: 12px; transition: border-color 0.2s; }
  .q-item:hover { border-color: rgba(244,196,48,0.3); }
  .q-num { min-width: 32px; height: 32px; border-radius: 8px; background: var(--accent); color: #0f0e17; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; }
  .q-content { flex: 1; }
  .q-text { font-size: 15px; font-weight: 500; margin-bottom: 4px; }
  .q-answer { font-size: 13px; color: var(--muted); }
  .q-answer span { color: var(--success); font-weight: 500; }

  .empty { text-align: center; padding: 48px 20px; color: var(--muted); }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty p { font-size: 15px; }

  .quiz-progress { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
  .progress-bar { flex: 1; height: 6px; background: var(--surface); border-radius: 10px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 10px; transition: width 0.5s ease; }
  .progress-text { font-size: 13px; color: var(--muted); white-space: nowrap; font-weight: 500; }

  .question-card { background: var(--card); border: 1.5px solid var(--border); border-radius: 24px; padding: 40px 36px; text-align: center; margin-bottom: 20px; position: relative; overflow: hidden; }
  .question-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--accent), var(--accent2)); }
  .q-badge { display: inline-block; background: rgba(244,196,48,0.12); color: var(--accent); border: 1px solid rgba(244,196,48,0.3); border-radius: 20px; padding: 6px 16px; font-size: 12px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 20px; }
  .question-text { font-family: 'Gowun Batang', serif; font-size: clamp(20px, 4vw, 30px); font-weight: 700; line-height: 1.5; margin-bottom: 8px; }

  .answer-area { background: var(--card); border: 1.5px solid var(--border); border-radius: 20px; padding: 28px; margin-bottom: 16px; }
  .answer-area label { font-size: 14px; margin-bottom: 12px; color: var(--muted); }
  .answer-input-wrap { display: flex; gap: 10px; }
  .answer-input-wrap input { margin-bottom: 0; flex: 1; font-size: 16px; }
  .answer-input-wrap .btn { white-space: nowrap; padding: 14px 22px; width: auto; }

  .feedback { border-radius: 14px; padding: 16px 20px; font-size: 14px; font-weight: 500; display: none; align-items: center; gap: 12px; margin-top: 14px; animation: fadeIn 0.3s ease; }
  .feedback.show { display: flex; }
  .feedback.correct { background: rgba(46,196,182,0.12); border: 1px solid rgba(46,196,182,0.3); color: var(--success); }
  .feedback.wrong { background: rgba(232,69,69,0.10); border: 1px solid rgba(232,69,69,0.3); color: var(--error); }
  .feedback-icon { font-size: 22px; }

  .score-screen { text-align: center; padding: 40px 20px; }
  .score-circle { width: 140px; height: 140px; border-radius: 50%; border: 4px solid var(--accent); display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0 auto 28px; background: rgba(244,196,48,0.05); }
  .score-num { font-family: 'Gowun Batang', serif; font-size: 48px; font-weight: 700; color: var(--accent); line-height: 1; }
  .score-label { font-size: 13px; color: var(--muted); margin-top: 4px; }
  .score-title { font-family: 'Gowun Batang', serif; font-size: 26px; font-weight: 700; margin-bottom: 12px; }
  .score-sub { color: var(--muted); font-size: 15px; margin-bottom: 32px; }

  /* 입장 화면 */
  .login-overlay {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    z-index: 100; padding: 20px;
  }
  .login-overlay::before {
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(244,196,48,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 80% 80%, rgba(232,106,58,0.07) 0%, transparent 60%);
    pointer-events: none;
  }
  .login-box {
    position: relative;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 28px;
    padding: 44px 40px;
    width: 100%; max-width: 420px;
    text-align: center;
  }
  .login-title { font-family: 'Gowun Batang', serif; font-size: 36px; font-weight: 700; margin-bottom: 4px; }
  .login-sub { font-size: 12px; color: var(--muted); margin-bottom: 32px; letter-spacing: 3px; }

  .role-row { display: flex; gap: 10px; margin-bottom: 24px; }
  .role-btn { flex: 1; padding: 14px; border: 2px solid var(--border); border-radius: 14px; background: var(--surface); color: var(--muted); font-family: 'Noto Sans KR', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .role-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(244,196,48,0.08); }

  .login-error { color: var(--error); font-size: 13px; margin-top: -10px; margin-bottom: 14px; display: none; }

  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px; backdrop-filter: blur(4px); }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
  .shake { animation: shake 0.3s ease; }

  .stats-row { display: flex; gap: 12px; margin-bottom: 24px; }
  .stat-card { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px; text-align: center; }
  .stat-val { font-size: 26px; font-weight: 700; color: var(--accent); font-family: 'Gowun Batang', serif; }
  .stat-lbl { font-size: 12px; color: var(--muted); margin-top: 2px; }

  .no-quiz { text-align: center; padding: 60px 20px; color: var(--muted); }
  .no-quiz .icon { font-size: 52px; margin-bottom: 16px; }
  .no-quiz p { font-size: 15px; line-height: 1.7; }

  .top-bar { display: flex; justify-content: flex-end; margin-bottom: 8px; }
  .logout-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); font-family: 'Noto Sans KR', sans-serif; font-size: 12px; padding: 6px 14px; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
  .logout-btn:hover { border-color: var(--accent2); color: var(--accent2); }
</style>
</head>
<body>

<!-- 입장 화면 -->
<div class="login-overlay" id="loginScreen">
  <div class="login-box">
    <div class="login-title">클래스<span style="color:var(--accent)">퀴즈</span></div>
    <div class="login-sub">✦ CLASSROOM QUIZ ✦</div>

    <div class="role-row">
      <button class="role-btn active" id="roleStudent" onclick="selectRole('student')">👨‍🎓 학생</button>
      <button class="role-btn" id="roleTeacher" onclick="selectRole('teacher')">👩‍🏫 선생님</button>
    </div>

    <div id="studentCodeWrap">
      <label>참여 코드</label>
      <input type="password" id="studentCodeInput" placeholder="선생님께 받은 코드 입력" onkeydown="if(event.key==='Enter')enterSite()">
    </div>
    <div id="teacherCodeWrap" style="display:none">
      <label>선생님 비밀번호</label>
      <input type="password" id="teacherPwInput" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')enterSite()">
    </div>

    <div class="login-error" id="loginError">❌ 코드가 틀렸어요. 다시 확인해주세요!</div>
    <button class="btn btn-primary" onclick="enterSite()">입장하기 →</button>
    <div style="margin-top:16px; font-size:12px; color:var(--muted)">
      기본 코드 — 학생: <strong style="color:var(--accent)">0000</strong> &nbsp;/&nbsp; 선생님: <strong style="color:var(--accent)">1234</strong>
    </div>
  </div>
</div>

<div class="wrapper">
  <header>
    <div class="label">✦ Classroom Quiz ✦</div>
    <h1>클래스<span>퀴즈</span></h1>
  </header>

  <div class="top-bar">
    <button class="logout-btn" onclick="logout()">🚪 나가기</button>
  </div>

  <div class="tabs">
    <button class="tab-btn active" id="tabQuiz" onclick="switchTab('quiz', this)">📝 퀴즈 풀기</button>
    <button class="tab-btn" id="adminTabBtn" onclick="switchTab('admin', this)" style="display:none">🔑 문제 관리</button>
  </div>

  <!-- QUIZ PANEL -->
  <div class="panel active" id="panel-quiz">
    <div id="noQuizState" class="card no-quiz" style="display:none">
      <div class="icon">🎯</div>
      <p>아직 등록된 문제가 없어요.<br>선생님께서 문제를 먼저 등록해 주세요!</p>
    </div>
    <div id="quizState" style="display:none">
      <div class="quiz-progress">
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <div class="progress-text" id="progressText">1 / 1</div>
      </div>
      <div class="question-card">
        <div class="q-badge" id="qBadge">문제 1</div>
        <div class="question-text" id="qText"></div>
      </div>
      <div class="answer-area">
        <label>✏️ 정답을 입력하세요</label>
        <div class="answer-input-wrap">
          <input type="text" id="answerInput" placeholder="여기에 입력..." onkeydown="if(event.key==='Enter')checkAnswer()">
          <button class="btn btn-primary" onclick="checkAnswer()">확인</button>
        </div>
        <div class="feedback" id="feedback">
          <span class="feedback-icon" id="feedbackIcon"></span>
          <span id="feedbackText"></span>
        </div>
      </div>
    </div>
    <div id="scoreState" style="display:none">
      <div class="card score-screen">
        <div class="score-circle">
          <div class="score-num" id="scoreNum">0</div>
          <div class="score-label">점</div>
        </div>
        <div class="score-title" id="scoreTitle"></div>
        <div class="score-sub" id="scoreSub"></div>
        <div class="stats-row">
          <div class="stat-card"><div class="stat-val" id="statTotal"></div><div class="stat-lbl">전체 문제</div></div>
          <div class="stat-card"><div class="stat-val" id="statAttempts"></div><div class="stat-lbl">총 시도 횟수</div></div>
        </div>
        <button class="btn btn-primary" onclick="restartQuiz()">🔄 다시 풀기</button>
      </div>
    </div>
  </div>

  <!-- ADMIN PANEL -->
  <div class="panel" id="panel-admin">
    <div class="card">
      <div class="card-title">✦ 문제 추가</div>
      <label>문제</label>
      <textarea id="newQuestion" placeholder="문제를 입력하세요..."></textarea>
      <label>정답</label>
      <input type="text" id="newAnswer" placeholder="정답을 입력하세요" onkeydown="if(event.key==='Enter')addQuestion()">
      <button class="btn btn-primary" onclick="addQuestion()">+ 문제 추가</button>
    </div>
    <div class="card">
      <div class="card-title">✦ 등록된 문제 <span id="qCount" style="color:var(--accent)">0</span>개</div>
      <ul class="q-list" id="qList">
        <li><div class="empty"><div class="empty-icon">📭</div><p>아직 등록된 문제가 없어요</p></div></li>
      </ul>
    </div>
    <div class="card">
      <div class="card-title">✦ 코드 설정</div>
      <label>학생 참여 코드 변경</label>
      <input type="password" id="newStudentCode" placeholder="새 학생 참여 코드">
      <label>선생님 비밀번호 변경</label>
      <input type="password" id="newTeacherPw" placeholder="새 선생님 비밀번호">
      <button class="btn btn-primary" onclick="saveCodes()">저장하기</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, onSnapshot, addDoc, deleteDoc, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCoci7Wq2_tRwiSv3MQUvBzh8Vqd0xOG7A",
    authDomain: "quiz-955b7.firebaseapp.com",
    projectId: "quiz-955b7",
    storageBucket: "quiz-955b7.firebasestorage.app",
    messagingSenderId: "341104666043",
    appId: "1:341104666043:web:22aebf87f01a7637dc509e"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let questions = [];
  let teacherPw = '1234';
  let studentCode = '0000';
  let currentRole = 'student';
  let currentQ = 0;
  let totalAttempts = 0;

  async function loadCodes() {
    try {
      const snap = await getDoc(doc(db, 'settings', 'admin'));
      if (snap.exists()) {
        if (snap.data().pw) teacherPw = snap.data().pw;
        if (snap.data().studentCode) studentCode = snap.data().studentCode;
      }
    } catch(e) {}
  }

  onSnapshot(collection(db, 'questions'), (snapshot) => {
    questions = [];
    snapshot.forEach(d => questions.push({ id: d.id, ...d.data() }));
    questions.sort((a, b) => (a.order || 0) - (b.order || 0));
    renderAdmin();
    if (document.getElementById('panel-quiz').classList.contains('active')) initQuiz();
  });

  // === 역할 선택 ===
  window.selectRole = function(role) {
    currentRole = role;
    document.getElementById('roleStudent').classList.toggle('active', role === 'student');
    document.getElementById('roleTeacher').classList.toggle('active', role === 'teacher');
    document.getElementById('studentCodeWrap').style.display = role === 'student' ? 'block' : 'none';
    document.getElementById('teacherCodeWrap').style.display = role === 'teacher' ? 'block' : 'none';
    document.getElementById('loginError').style.display = 'none';
  }

  // === 입장 ===
  window.enterSite = function() {
    const err = document.getElementById('loginError');
    if (currentRole === 'student') {
      const code = document.getElementById('studentCodeInput').value;
      if (code === studentCode) {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('adminTabBtn').style.display = 'none';
        initQuiz();
      } else {
        err.style.display = 'block';
        document.getElementById('studentCodeInput').classList.add('shake');
        setTimeout(() => document.getElementById('studentCodeInput').classList.remove('shake'), 400);
      }
    } else {
      const pw = document.getElementById('teacherPwInput').value;
      if (pw === teacherPw) {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('adminTabBtn').style.display = 'block';
        initQuiz();
      } else {
        err.style.display = 'block';
        document.getElementById('teacherPwInput').classList.add('shake');
        setTimeout(() => document.getElementById('teacherPwInput').classList.remove('shake'), 400);
      }
    }
  }

  // === 로그아웃 ===
  window.logout = function() {
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('studentCodeInput').value = '';
    document.getElementById('teacherPwInput').value = '';
    document.getElementById('loginError').style.display = 'none';
    selectRole('student');
  }

  // === 탭 전환 ===
  window.switchTab = function(tab, btn) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('panel-' + tab).classList.add('active');
    if (tab === 'quiz') initQuiz();
  }

  // === 문제 관리 ===
  window.addQuestion = async function() {
    const q = document.getElementById('newQuestion').value.trim();
    const a = document.getElementById('newAnswer').value.trim();
    if (!q || !a) { alert('문제와 정답을 모두 입력해주세요!'); return; }
    await addDoc(collection(db, 'questions'), { q, a, order: Date.now() });
    document.getElementById('newQuestion').value = '';
    document.getElementById('newAnswer').value = '';
  }

  window.deleteQuestion = async function(id) {
    if (!confirm('이 문제를 삭제할까요?')) return;
    await deleteDoc(doc(db, 'questions', id));
  }

  window.saveCodes = async function() {
    const ns = document.getElementById('newStudentCode').value.trim();
    const nt = document.getElementById('newTeacherPw').value.trim();
    if (!ns && !nt) { alert('변경할 코드를 입력해주세요!'); return; }
    if (ns) studentCode = ns;
    if (nt) teacherPw = nt;
    await setDoc(doc(db, 'settings', 'admin'), { pw: teacherPw, studentCode });
    document.getElementById('newStudentCode').value = '';
    document.getElementById('newTeacherPw').value = '';
    alert('✅ 코드가 저장되었어요!');
  }

  function renderAdmin() {
    const list = document.getElementById('qList');
    document.getElementById('qCount').textContent = questions.length;
    if (questions.length === 0) {
      list.innerHTML = '<li><div class="empty"><div class="empty-icon">📭</div><p>아직 등록된 문제가 없어요</p></div></li>';
      return;
    }
    list.innerHTML = questions.map((item, i) => `
      <li class="q-item">
        <div class="q-num">${i + 1}</div>
        <div class="q-content">
          <div class="q-text">${escHtml(item.q)}</div>
          <div class="q-answer">정답: <span>${escHtml(item.a)}</span></div>
        </div>
        <button class="btn btn-danger" onclick="deleteQuestion('${item.id}')">삭제</button>
      </li>
    `).join('');
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // === 퀴즈 ===
  function initQuiz() {
    currentQ = 0;
    totalAttempts = 0;
    if (questions.length === 0) {
      document.getElementById('noQuizState').style.display = 'block';
      document.getElementById('quizState').style.display = 'none';
      document.getElementById('scoreState').style.display = 'none';
      return;
    }
    document.getElementById('noQuizState').style.display = 'none';
    document.getElementById('scoreState').style.display = 'none';
    document.getElementById('quizState').style.display = 'block';
    showQuestion();
  }

  function showQuestion() {
    const item = questions[currentQ];
    document.getElementById('qBadge').textContent = `문제 ${currentQ + 1}`;
    document.getElementById('qText').textContent = item.q;
    document.getElementById('answerInput').value = '';
    hideFeedback();
    updateProgress();
    setTimeout(() => document.getElementById('answerInput').focus(), 100);
  }

  function updateProgress() {
    const pct = (currentQ / questions.length) * 100;
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressText').textContent = `${currentQ + 1} / ${questions.length}`;
  }

  window.checkAnswer = function() {
    const input = document.getElementById('answerInput').value.trim();
    const correct = questions[currentQ].a.trim();
    totalAttempts++;
    if (input.toLowerCase() === correct.toLowerCase()) {
      showFeedback(true);
      setTimeout(() => {
        currentQ++;
        if (currentQ >= questions.length) showScore();
        else showQuestion();
      }, 900);
    } else {
      showFeedback(false);
      document.getElementById('answerInput').value = '';
      document.getElementById('answerInput').classList.add('shake');
      setTimeout(() => document.getElementById('answerInput').classList.remove('shake'), 400);
      setTimeout(() => document.getElementById('answerInput').focus(), 100);
    }
  }

  function showFeedback(correct) {
    const fb = document.getElementById('feedback');
    fb.className = 'feedback show ' + (correct ? 'correct' : 'wrong');
    document.getElementById('feedbackIcon').textContent = correct ? '✅' : '❌';
    document.getElementById('feedbackText').textContent = correct ? '정답이에요! 🎉 다음 문제로 넘어갑니다' : '틀렸어요. 다시 시도해보세요!';
  }

  function hideFeedback() {
    document.getElementById('feedback').className = 'feedback';
  }

  function showScore() {
    document.getElementById('quizState').style.display = 'none';
    document.getElementById('scoreState').style.display = 'block';
    const total = questions.length;
    const score = Math.min(Math.round((total / totalAttempts) * 100), 100);
    document.getElementById('scoreNum').textContent = score;
    document.getElementById('statTotal').textContent = total;
    document.getElementById('statAttempts').textContent = totalAttempts;
    let title, sub;
    if (score >= 90) { title = '완벽해요! 🏆'; sub = '모든 문제를 거의 한 번에 맞췄어요!'; }
    else if (score >= 70) { title = '잘했어요! 🌟'; sub = '조금만 더 연습하면 완벽할 거예요!'; }
    else { title = '계속 도전해요! 💪'; sub = '틀린 문제를 복습하고 다시 도전해봐요!'; }
    document.getElementById('scoreTitle').textContent = title;
    document.getElementById('scoreSub').textContent = sub;
    document.getElementById('progressFill').style.width = '100%';
    document.getElementById('progressText').textContent = `${total} / ${total}`;
  }

  window.restartQuiz = function() { initQuiz(); }

  await loadCodes();
</script>
</body>
</html>
